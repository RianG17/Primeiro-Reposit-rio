
<!DOCTYPE html>
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Um Site Bacana</title>
</head>
<!--BODY é parte visível do site -->  
<body>   
        
        <!--H1 é o texto principal-->
        <h1>Título Heróico</h1>
        <!--Strong é uma marca de relevancia pra pesquisa e negrito-->
        <h2>Um teste <strong>heróico</strong></h2>
        <!--o P é para Paragrafos-->
        <p>Isso é um paragrafo</p>
        <!--Button para botão-->
        <button>Clique no meu Botão</button>
        <!--Input é a caixa de texto aberta-->
        <input type="checkbox">
        
        <!--FIGURE é uma caixa para comandos de IMG-->
        <figure>
            <!--(./)É para imagens dentro do documento já-->
            <!--ALT é o texto para quando a imagem falhar-->
            <!--HEIGHT e WIDHT é a altura e largura dentro da imagem-->
            <img src="./Arte Estrela.jpg" alt="desenho de estrelas">
            <figcaption>Foto de Estrelas</figcaption>
        </figure>
        <!--BR é Break, uma quebra de linhas-->
        <img src="https://i.pinimg.com/736x/55/4b/33/554b33a7d4114133375859773e6edc7a.jpg" 
        height="200px" width="400px">
        
        
        <a href=""></a>
        <!--OL=Lista Ordenada-->
        <ol>
            <li>Ana</li>
            <li>Arthur</li>
            <li>Amanda</li>
        </ol>
        <!--UL=Lista Não Ordenada-->
        <ul>
            <li>Zoe</li>
            <li>Yasmin</li>
            <li>Wagner</li>
        </ul>
        <!--DIV é uma caixa para separar elementos-->
        <div>
            <p>Caixa</p>
        </div>
        <!--SPAN é separar uma parte do texto para ser diferente, cor, listra etc-->
        <span>

        </span>
        <!--TABLE para tabelas-->
             <!--CELLPADDING para dar distancia entre as bordas-->
             <!--BORDERCOLOR para cor da borda-->
             <!--BORDER para dar borda-->
        <!--TR para criar uma das partes da tabela-->
             <!--TH para a referencia da tabela-->
             <!--TD para os elementos dela-->
        <table border="2" cellpadding="10" bordercolor="purple">
            <tr>
                <th>Tipo</th>
                <th>Valor</th>
                <th>Data</th>
            </tr>
            <tr>
                <td>Alimentação</td>
                <td>R$ 30,00</td>
                <td>11/02/2026</td>
            </tr>
            <tr>
                <td>Diversão</td>
                <td>R$ 48,00</td>
                <td>11/02/2026</td>
            </tr>
        </table>
        <!--VIDEO igual imagem, porém precisa de CONTROLS ativo-->
        <!--CONTROLS"L"IST. Sim L maiusculo-->
        <!--CONTROLSLIST NODOWNLOAD PARA N DEIXAR BAIXAR-->
        <!--AUTOPLAY para já rodar o video ao entrar no site, porém alguns
            navegadores não permitem, a não ser que estejam MUTED-->
        <!--POSTER é a thumb do video-->
        <video src="/VID_56851015_230934_643.mp4" controls></video>

        <!--IFRAME é para colocar site dentro do site-->
        <!--Sites podem n permitir o uso, mas no Youtube ou Maps há a opção em Compartilhar e Incorporar-->
        <iframe width="560" height="315" src="https://www.youtube.com/embed/30fbS1x0i5M?si=ZSDpfWJffhE2ZV4Z" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>">
        <br>
        <!--INPUT são as opções de preenchimento de informações-->
        <!--AUTOCOMPLETE é para preencher automaticamente com as informações registradas da pessoa-->
        <!--DISABLE para desativar-->
        <label>
            <input autocomplete="street-address" placeholder="Digite sua Rua">
            <br>
            <input autocomplete="email" type="email" placeholder="Digite seu Email">
            Esse é seu email?
            <input type="checkbox">
            <br>
            <input autocomplete="name" placeholder="Digite seu Nome">
            <br>
            <input type="password" placeholder="Digite sua Senha">
            <input type="file" multiple accept=".jpg">
            <!--"*" costuma significar na programação tudo-->
        </label>
        <input type="color">
        <!--FORMS é para Formularios no geral-->
        <forms action="" method="get">
            <h1>Digite Seu Endereço</h1>
           <label>
            Rua:
            <input type="text" name="Rua" autocomplete="street-address">
           </label> 
           <label>
            <input type="number" name="numero" autocomplete="cc-number">
           </label>
           <button type="submit"></button>Enviar Dados</button>
        </forms>
        <div>
            <img>
            <a>Tenis</a>
            <a>Jaqueta</a>
            <a>Materiais</a>
        </div>
        <img src="./Captura de tela 2026-02-17 154831.png">
        

</body>
